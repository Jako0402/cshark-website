<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="/assets/Cshark-text.png" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Bingo</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="index.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <link href='https://fonts.googleapis.com/css?family=Lato:400,700' rel='stylesheet' type='text/css'>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>
</head>
<body id="body">
<div id="header-comp"></div>
<script>
    $(function() {
        $("#header-comp").load("/header.html", function () {
            $.getScript("/js/home.js", function() {
                initHome();
            });

            $.getScript("/js/darkmode.js", function() {
                initDarkmode();
            });
        });
    });
</script>
    <div class="main">
        <br>
        <div class="contentPane">
            <h1>HCI lecture bingo </h1>
            <p>Click on a box when it has happened during the lecture (Warning, nothing will be saved, so please don't reload or close the tab)</p>

                    <div id="bingoBody">
                
                    </div>

                </div>
                <script>
                    // Grab the container div
                    const bingoBody = document.getElementById("bingoBody");

                    // Add event listener for click events
                    bingoBody.addEventListener("click", (event) => {
                        // Find the clicked child element (only if it's a direct child of bingoBody)
                        const clickedElement = event.target.closest("#bingoBody > *");

                        if (clickedElement && bingoBody.contains(clickedElement)) {
                            // Get the index of the clicked child
                            const children = Array.from(bingoBody.children);
                            const index = children.indexOf(clickedElement);

                            if (index != 12) clickedElement.classList.toggle("activeCell");
                        }
                    });
                </script>

        </div>
    </div>
</body>
